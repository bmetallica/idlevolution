services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idlevolution}
      POSTGRES_USER: ${POSTGRES_USER:-idle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-idle} -d ${POSTGRES_DB:-idlevolution}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8420}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-idle}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-idlevolution}
      DATA_DIR: /data
      TICK_SECONDS: ${TICK_SECONDS:-5}
      PERSIST_EVERY_TICKS: ${PERSIST_EVERY_TICKS:-12}
      OFFLINE_CAP_HOURS: ${OFFLINE_CAP_HOURS:-24}
      AI_IMPORT_TOKEN: ${AI_IMPORT_TOKEN:?AI_IMPORT_TOKEN muss in .env gesetzt sein}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  ai-worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    command: ["node", "src/ai/scheduler.js"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_URL: http://app:3000
      DATA_DIR: /data
      AI_IMPORT_TOKEN: ${AI_IMPORT_TOKEN}
      # LLM-Server (llama.cpp / llama-swap, OpenAI-kompatible API)
      LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:8080}
      LLM_MODEL: ${LLM_MODEL:-gemma4-12b}
      LLM_CTX: ${LLM_CTX:-32768}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-12288}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      # Cron-Zeitplan für die nächtliche Content-Generierung
      AI_CRON: ${AI_CRON:-0 3 * * *}
      AI_RUN_ON_START: ${AI_RUN_ON_START:-false}
    volumes:
      - ./data:/data

volumes:
  pgdata:
